name: Scrape Arab News

on:
  workflow_dispatch:
    inputs:
      save_artifacts:
        description: "Upload page HTML/screenshots even when scraping succeeds"
        required: false
        default: "false"
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Preserve previous scrape cache
        run: |
          mkdir -p artifacts/cache
          cp -f data/latest.json artifacts/cache/latest.json 2>/dev/null || true
          cp -f data/latest.md artifacts/cache/latest.md 2>/dev/null || true
          if [ -d archive/latest ]; then
            mkdir -p artifacts/cache/archive-latest
            cp -R archive/latest/. artifacts/cache/archive-latest/
          fi

      - name: Scrape
        id: scrape
        continue-on-error: true
        run: |
          set +e
          status=0
          for attempt in 1 2 3; do
            echo "Scrape attempt ${attempt}/3"
            npm run scrape
            status=$?
            if [ "$status" -eq 0 ]; then
              echo "status=0" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Scrape attempt ${attempt} failed with exit code ${status}."
            if [ "$attempt" -lt 3 ]; then
              sleep $((attempt * 45))
            fi
          done
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          exit "$status"
        env:
          TIME_ZONE: Asia/Riyadh
          VIDEO_LIMIT: "3"
          EXTRA_WAIT_MS: "8000"
          ARCHIVE_ITEMS: "true"
          SAVE_ARTICLE_HTML: "false"
          SAVE_VIDEO_FILES: "true"
          FFMPEG_PATH: /usr/bin/ffmpeg
          MAX_VIDEO_BYTES: "95000000"
          SAVE_PAGE_ARTIFACTS: ${{ inputs.save_artifacts || 'false' }}
          PLAYWRIGHT_PROXY_SERVER: ${{ secrets.PLAYWRIGHT_PROXY_SERVER }}
          PLAYWRIGHT_PROXY_USERNAME: ${{ secrets.PLAYWRIGHT_PROXY_USERNAME }}
          PLAYWRIGHT_PROXY_PASSWORD: ${{ secrets.PLAYWRIGHT_PROXY_PASSWORD }}

      - name: Download clips from cached listing
        id: cached_clips
        if: steps.scrape.outputs.status != '0'
        run: npm run download:clips
        env:
          TIME_ZONE: Asia/Riyadh
          VIDEO_LIMIT: "3"
          FFMPEG_PATH: /usr/bin/ffmpeg
          MAX_VIDEO_BYTES: "95000000"

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arabnews-debug
          path: artifacts/
          if-no-files-found: ignore

      - name: Commit scraped data
        if: steps.scrape.outputs.status == '0' || steps.cached_clips.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/latest.md archive/latest rendered-clips
          if git diff --cached --quiet; then
            echo "No scraped data changes."
          else
            git commit -m "Update Arab News scrape"
            git push
          fi

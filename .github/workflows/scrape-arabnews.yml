name: Scrape Arab News

on:
  workflow_dispatch:
    inputs:
      save_artifacts:
        description: "Upload page HTML/screenshots even when scraping succeeds"
        required: false
        default: "false"
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  scrape:
    runs-on: [self-hosted, linux, x64, kc-sand, arabnews-fixed-ip]
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install chromium

      - name: Check FFmpeg
        run: ffmpeg -version

      - name: Scrape
        id: scrape
        run: |
          for attempt in 1 2 3; do
            echo "Scrape attempt ${attempt}/3"
            if npm run scrape; then
              exit 0
            fi
            echo "Scrape attempt ${attempt} failed."
            if [ "$attempt" -lt 3 ]; then
              sleep $((attempt * 45))
            fi
          done
          exit 1
        env:
          TIME_ZONE: Asia/Riyadh
          VIDEO_LIMIT: "3"
          EXTRA_WAIT_MS: "8000"
          ARCHIVE_ITEMS: "true"
          SAVE_ARTICLE_HTML: "false"
          SAVE_VIDEO_FILES: "true"
          FFMPEG_PATH: /usr/bin/ffmpeg
          MAX_VIDEO_BYTES: "95000000"
          RECENT24H_ENABLED: "true"
          RECENT24H_REQUIRE_ITEMS: "false"
          RECENT24H_CANDIDATE_LIMIT: "220"
          RECENT24H_LISTING_PAGES: "2"
          RECENT24H_REQUEST_DELAY_MS: "250"
          SAVE_PAGE_ARTIFACTS: ${{ inputs.save_artifacts || 'false' }}
          PLAYWRIGHT_PROXY_SERVER: ${{ secrets.PLAYWRIGHT_PROXY_SERVER }}
          PLAYWRIGHT_PROXY_USERNAME: ${{ secrets.PLAYWRIGHT_PROXY_USERNAME }}
          PLAYWRIGHT_PROXY_PASSWORD: ${{ secrets.PLAYWRIGHT_PROXY_PASSWORD }}

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arabnews-debug
          path: artifacts/
          if-no-files-found: ignore

      - name: Commit scraped data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/latest.md data/recent-24h.json data/recent-24h.md archive/latest rendered-clips
          if git diff --cached --quiet; then
            echo "No scraped data changes."
          else
            git commit -m "Update Arab News scrape"
            git push
          fi
